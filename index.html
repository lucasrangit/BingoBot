<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Bingo & Logger</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #27ae60;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 { color: #333; }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: opacity 0.2s;
        }

        #startBtn { background-color: var(--primary); color: white; }
        #stopBtn { background-color: #e74c3c; color: white; }
        #downloadBtn { background-color: #95a5a6; color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .bingo-card {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            max-width: 500px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .cell {
            width: 80px;
            height: 80px;
            border: 2px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            border-radius: 8px;
            transition: all 0.3s ease;
            background: #fff;
            text-transform: capitalize;
        }

        .cell.highlight {
            background-color: var(--success);
            color: white;
            border-color: #1e8449;
            transform: scale(1.05);
        }

        .status {
            margin-top: 15px;
            font-style: italic;
            color: #666;
        }

        #logArea {
            margin-top: 20px;
            width: 100%;
            max-width: 500px;
            height: 150px;
            background: #fff;
            border: 1px solid #ccc;
            padding: 10px;
            overflow-y: scroll;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <h1>Voice Bingo</h1>

    <div class="controls">
        <button id="startBtn">Start Listening</button>
        <button id="stopBtn" disabled>Stop</button>
        <button id="downloadBtn">Download Log</button>
    </div>

    <div id="status" class="status">Click "Start" to begin...</div>

    <div class="bingo-card" id="bingoCard">
        <!-- Cells generated by JS -->
    </div>

    <h3>Activity Log</h3>
    <div id="logArea"></div>

    <script>
        // 1. CONFIGURATION: Define your Bingo keywords here
        const keywords = [
            "Apple", "Banana", "Cherry", "Dragonfruit", "Elderberry",
            "Fig", "Grape", "Honeydew", "Iceberg", "Jackfruit",
            "Kiwi", "Lemon", "Mango", "Nectarine", "Orange",
            "Papaya", "Quince", "Raspberry", "Strawberry", "Tomato",
            "Ugli", "Vanilla", "Watermelon", "Xigua", "Yam"
        ];

        let recognition;
        let eventLog = [];
        const cardContainer = document.getElementById('bingoCard');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const logArea = document.getElementById('logArea');
        const statusDisplay = document.getElementById('status');

        // 2. Initialize the Bingo Card
        function initCard() {
            cardContainer.innerHTML = '';
            keywords.forEach(word => {
                const div = document.createElement('div');
                div.className = 'cell';
                div.textContent = word;
                div.id = `cell-${word.toLowerCase()}`;
                cardContainer.appendChild(div);
            });
        }

        // 3. Setup Speech Recognition
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            
            recognition.continuous = true;      // Keep listening
            recognition.interimResults = false; // Only final results
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                statusDisplay.textContent = "Listening for keywords...";
                startBtn.disabled = true;
                stopBtn.disabled = false;
            };

            recognition.onresult = (event) => {
                const transcript = event.results[event.results.length - 1][0].transcript.trim().toLowerCase();
                console.log("Heard:", transcript);
                checkMatch(transcript);
            };

            recognition.onerror = (event) => {
                statusDisplay.textContent = "Error: " + event.error;
            };

            recognition.onend = () => {
                if (!stopBtn.disabled) {
                    recognition.start(); // Auto-restart if not manually stopped
                } else {
                    statusDisplay.textContent = "Stopped.";
                }
            };
        } else {
            statusDisplay.textContent = "Speech API not supported in this browser.";
            startBtn.disabled = true;
        }

        // 4. Match and Log Logic
        function checkMatch(spokenText) {
            keywords.forEach(word => {
                const lowerWord = word.toLowerCase();
                // Check if the spoken text contains the keyword
                if (spokenText.includes(lowerWord)) {
                    const cell = document.getElementById(`cell-${lowerWord}`);
                    
                    if (cell && !cell.classList.contains('highlight')) {
                        cell.classList.add('highlight');
                        
                        // Add to log
                        const timestamp = new Date().toLocaleTimeString();
                        const entry = `[${timestamp}] Found keyword: "${word}"`;
                        eventLog.push(entry);
                        
                        const logEntry = document.createElement('div');
                        logEntry.textContent = entry;
                        logArea.prepend(logEntry);
                    }
                }
            });
        }

        // 5. Controls
        startBtn.addEventListener('click', () => recognition.start());
        
        stopBtn.addEventListener('click', () => {
            stopBtn.disabled = true;
            startBtn.disabled = false;
            recognition.stop();
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            if (eventLog.length === 0) return alert("No logs recorded yet!");
            
            const blob = new Blob([eventLog.join('\n')], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `bingo-log-${Date.now()}.txt`;
            a.click();
        });

        // Start the app
        initCard();
    </script>
</body>
</html>
